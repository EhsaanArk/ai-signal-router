name: Post-deploy — Staging verification

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to comment results on (optional)"
        required: false
        type: string
  push:
    branches: [staging]

concurrency:
  group: post-deploy-staging
  cancel-in-progress: true

env:
  STAGING_API_URL: https://ai-signal-router-staging.up.railway.app
  STAGING_FRONTEND_URL: https://profound-communication-staging.up.railway.app

jobs:
  # ---------------------------------------------------------------------------
  # Step 0: Wait for Railway deploy to finish
  # ---------------------------------------------------------------------------
  wait-for-deploy:
    name: Wait for Railway deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Wait for Railway to deploy
        run: |
          echo "Waiting 90 seconds for Railway to build and deploy..."
          sleep 90

      - name: Verify staging is up
        run: |
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_API_URL/health" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Staging API is up (attempt $i)"
              exit 0
            fi
            echo "Staging not ready (HTTP $HTTP_CODE), retrying in 30s... (attempt $i/5)"
            sleep 30
          done
          echo "::warning::Staging API not responding after 5 attempts — proceeding anyway"

  # ---------------------------------------------------------------------------
  # Step 1: API health check
  # ---------------------------------------------------------------------------
  health-check:
    name: API health check
    runs-on: ubuntu-latest
    needs: [wait-for-deploy]
    if: always()
    outputs:
      health_status: ${{ steps.health.outputs.status }}
      deploy_health: ${{ steps.deploy.outputs.deploy_health }}
    steps:
      - name: Check /health
        id: health
        run: |
          HTTP_CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" "$STAGING_API_URL/health")
          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "status=pass" >> "$GITHUB_OUTPUT"
            echo "Health check passed"
            cat /tmp/health.json | python3 -m json.tool
          else
            echo "status=fail" >> "$GITHUB_OUTPUT"
            echo "::error::Health check failed with HTTP $HTTP_CODE"
            cat /tmp/health.json 2>/dev/null || true
          fi

      - name: Check /health/deploy
        id: deploy
        run: |
          HTTP_CODE=$(curl -s -o /tmp/deploy.json -w "%{http_code}" "$STAGING_API_URL/health/deploy")
          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          if [ "$HTTP_CODE" = "200" ]; then
            DEPLOY_HEALTH=$(python3 -c "import json; print(json.load(open('/tmp/deploy.json'))['deploy_health'])")
            echo "deploy_health=$DEPLOY_HEALTH" >> "$GITHUB_OUTPUT"
            echo "Deploy health: $DEPLOY_HEALTH"
            cat /tmp/deploy.json | python3 -m json.tool
          else
            echo "deploy_health=UNHEALTHY" >> "$GITHUB_OUTPUT"
            echo "::error::Deploy health check failed with HTTP $HTTP_CODE"
          fi

  # ---------------------------------------------------------------------------
  # Step 2: API smoke tests
  # ---------------------------------------------------------------------------
  api-smoke:
    name: API smoke tests
    runs-on: ubuntu-latest
    needs: health-check
    if: needs.health-check.outputs.health_status == 'pass'
    outputs:
      result: ${{ steps.smoke.outputs.result }}
      passed: ${{ steps.smoke.outputs.passed }}
      total: ${{ steps.smoke.outputs.total }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: pip install -r requirements-e2e.txt

      - name: Run API smoke + regression tests
        id: smoke
        env:
          TEST_USER_EMAIL: ${{ secrets.STAGING_TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.STAGING_TEST_USER_PASSWORD }}
        run: |
          set +e
          cd tests/e2e && python -m pytest test_api_smoke.py test_api_regression.py -v --tb=short --junitxml=../../smoke-results.xml -o addopts="" -o asyncio_mode=auto --rootdir=. -c /dev/null 2>&1 | tee ../../smoke-output.txt && cd ../..
          EXIT_CODE=$?
          set -e

          PASSED="$(grep -c 'PASSED' smoke-output.txt 2>/dev/null || printf '0')"
          FAILED="$(grep -c 'FAILED' smoke-output.txt 2>/dev/null || printf '0')"
          TOTAL=$((PASSED + FAILED))

          printf 'passed=%s\n' "$PASSED" >> "$GITHUB_OUTPUT"
          printf 'total=%s\n' "$TOTAL" >> "$GITHUB_OUTPUT"

          if [ "$TOTAL" = "0" ]; then
            printf 'result=skipped\n' >> "$GITHUB_OUTPUT"
          elif [ "$EXIT_CODE" = "0" ]; then
            printf 'result=pass\n' >> "$GITHUB_OUTPUT"
          else
            printf 'result=fail\n' >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: |
            smoke-results.xml
            smoke-output.txt

  # ---------------------------------------------------------------------------
  # Step 3: E2E Playwright tests
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E Playwright tests
    runs-on: ubuntu-latest
    needs: [health-check, api-smoke]
    if: needs.health-check.outputs.health_status == 'pass'
    outputs:
      result: ${{ steps.e2e.outputs.result }}
      passed: ${{ steps.e2e.outputs.passed }}
      total: ${{ steps.e2e.outputs.total }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          pip install -r requirements-e2e.txt
          playwright install chromium --with-deps

      - name: Run E2E tests
        id: e2e
        env:
          TEST_USER_EMAIL: ${{ secrets.STAGING_TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.STAGING_TEST_USER_PASSWORD }}
        run: |
          set +e
          cd tests/e2e && python -m pytest test_ui_flows.py test_ui_interactions.py -v --tb=short --junitxml=../../e2e-results.xml -o addopts="" -o asyncio_mode=auto --rootdir=. -c /dev/null 2>&1 | tee ../../e2e-output.txt && cd ../..
          EXIT_CODE=$?
          set -e

          PASSED="$(grep -c 'PASSED' e2e-output.txt 2>/dev/null || printf '0')"
          FAILED="$(grep -c 'FAILED' e2e-output.txt 2>/dev/null || printf '0')"
          TOTAL=$((PASSED + FAILED))

          printf 'passed=%s\n' "$PASSED" >> "$GITHUB_OUTPUT"
          printf 'total=%s\n' "$TOTAL" >> "$GITHUB_OUTPUT"

          if [ "$TOTAL" = "0" ]; then
            printf 'result=skipped\n' >> "$GITHUB_OUTPUT"
          elif [ "$EXIT_CODE" = "0" ]; then
            printf 'result=pass\n' >> "$GITHUB_OUTPUT"
          else
            printf 'result=fail\n' >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            e2e-results.xml
            e2e-output.txt
            test-screenshots/

  # ---------------------------------------------------------------------------
  # Step 4: Pipeline smoke tests (real Telegram signals)
  # ---------------------------------------------------------------------------
  pipeline:
    name: Pipeline smoke tests
    runs-on: ubuntu-latest
    needs: [health-check, api-smoke]
    if: needs.health-check.outputs.health_status == 'pass'
    outputs:
      result: ${{ steps.pipeline.outputs.result }}
      passed: ${{ steps.pipeline.outputs.passed }}
      total: ${{ steps.pipeline.outputs.total }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: pip install -r requirements-e2e.txt

      - name: Run pipeline smoke tests
        id: pipeline
        env:
          STAGING_API_URL: ${{ env.STAGING_API_URL }}
          TEST_USER_EMAIL: ${{ secrets.STAGING_TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.STAGING_TEST_USER_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TEST_CHAT_ID: "-1003819954354"
          PIPELINE_TEST_ACCOUNT_EMAIL: "ehsaan.private@gmail.com"
        run: |
          set +e
          cd tests/e2e
          python3 -m pytest test_pipeline_smoke.py -v --tb=short --junitxml=../../pipeline-results.xml -o addopts="" -o asyncio_mode=auto --rootdir=. -c /dev/null 2>&1 | tee ../../pipeline-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          cd ../..
          echo "Pipeline tests exit code: $EXIT_CODE"
          set -e

          PASSED="$(grep -c 'PASSED' pipeline-output.txt 2>/dev/null || printf '0')"
          FAILED="$(grep -c 'FAILED' pipeline-output.txt 2>/dev/null || printf '0')"
          TOTAL=$((PASSED + FAILED))

          printf 'passed=%s\n' "$PASSED" >> "$GITHUB_OUTPUT"
          printf 'total=%s\n' "$TOTAL" >> "$GITHUB_OUTPUT"

          if [ "$TOTAL" = "0" ]; then
            printf 'result=skipped\n' >> "$GITHUB_OUTPUT"
          elif [ "$EXIT_CODE" = "0" ]; then
            printf 'result=pass\n' >> "$GITHUB_OUTPUT"
          else
            printf 'result=fail\n' >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-test-results
          path: |
            pipeline-results.xml
            pipeline-output.txt

  # ---------------------------------------------------------------------------
  # Step 5: Sentry error check
  # ---------------------------------------------------------------------------
  sentry-check:
    name: Sentry error check
    runs-on: ubuntu-latest
    needs: [health-check]
    if: needs.health-check.outputs.health_status == 'pass'
    outputs:
      new_errors: ${{ steps.sentry.outputs.new_errors }}
    steps:
      - name: Check Sentry for new errors (last 10 minutes)
        id: sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "::warning::SENTRY_AUTH_TOKEN not configured -- skipping Sentry check"
            echo "new_errors=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
            "https://sentry.io/api/0/projects/$SENTRY_ORG/$SENTRY_PROJECT/issues/?query=is:unresolved+firstSeen:-10m&limit=10" \
          )
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Sentry API returned HTTP $HTTP_CODE"
            echo "new_errors=api_error" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COUNT=$(echo "$BODY" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")
          echo "Found $COUNT new Sentry issues in the last 10 minutes"

          if [ "$COUNT" -gt "0" ]; then
            echo "new_errors=$COUNT" >> "$GITHUB_OUTPUT"
            echo "::warning::$COUNT new Sentry errors detected after deploy"
            echo "$BODY" | python3 -m json.tool | head -100
          else
            echo "new_errors=0" >> "$GITHUB_OUTPUT"
            echo "No new Sentry errors -- deploy looks clean"
          fi

  # ---------------------------------------------------------------------------
  # Step 6: QA Guardian — Claude Code CLI
  # ---------------------------------------------------------------------------
  qa-guardian:
    name: QA Guardian (Deploy Confidence Score)
    runs-on: ubuntu-latest
    needs: [health-check, api-smoke, e2e, pipeline, sentry-check]
    if: always()
    outputs:
      score: ${{ steps.guardian.outputs.score }}
      verdict: ${{ steps.guardian.outputs.verdict }}
      summary: ${{ steps.guardian.outputs.summary }}
    steps:
      - uses: actions/checkout@v4

      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: test-results/

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run QA Guardian analysis
        id: guardian
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HEALTH_STATUS: ${{ needs.health-check.outputs.health_status }}
          DEPLOY_HEALTH: ${{ needs.health-check.outputs.deploy_health }}
          SMOKE_RESULT: ${{ needs.api-smoke.outputs.result }}
          SMOKE_PASSED: ${{ needs.api-smoke.outputs.passed }}
          SMOKE_TOTAL: ${{ needs.api-smoke.outputs.total }}
          E2E_RESULT: ${{ needs.e2e.outputs.result }}
          E2E_PASSED: ${{ needs.e2e.outputs.passed }}
          E2E_TOTAL: ${{ needs.e2e.outputs.total }}
          PIPELINE_RESULT: ${{ needs.pipeline.outputs.result }}
          PIPELINE_PASSED: ${{ needs.pipeline.outputs.passed }}
          PIPELINE_TOTAL: ${{ needs.pipeline.outputs.total }}
          SENTRY_ERRORS: ${{ needs.sentry-check.outputs.new_errors }}
        run: |
          PROMPT="You are the QA Guardian for Sage Radar AI STAGING environment.
          Analyze results and produce a Deploy Confidence Score (0-100).

          Health Check: $HEALTH_STATUS
          Deploy Health: $DEPLOY_HEALTH
          API Smoke Tests: $SMOKE_RESULT ($SMOKE_PASSED/$SMOKE_TOTAL passed)
          E2E Tests: $E2E_RESULT ($E2E_PASSED/$E2E_TOTAL passed)
          Pipeline Tests: $PIPELINE_RESULT ($PIPELINE_PASSED/$PIPELINE_TOTAL passed)
          Sentry New Errors: $SENTRY_ERRORS

          Scoring: Health pass +20, Deploy HEALTHY +10, API all pass +20, E2E all pass +20, Pipeline all pass +20, No Sentry errors +10.
          Deductions: 5xx in API -20, Pipeline fail -25, Health fail caps at 10, DEGRADED -10, Sentry errors -5 each (max -10), Skipped suite -5.
          SHIP >= 80, INVESTIGATE 50-79, BLOCK < 50.

          Respond ONLY JSON: {\"confidence_score\": N, \"verdict\": \"...\", \"summary\": \"...\", \"details\": [...]}"

          GUARDIAN_OUTPUT=$(claude -p "$PROMPT" --output-format json 2>/dev/null || echo '{"confidence_score": 0, "verdict": "BLOCK", "summary": "QA Guardian failed to run"}')

          echo "$GUARDIAN_OUTPUT" > /tmp/guardian-result.json
          echo "## QA Guardian Result" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$GUARDIAN_OUTPUT" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          SCORE=$(echo "$GUARDIAN_OUTPUT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('confidence_score', 0))" 2>/dev/null || echo "0")
          VERDICT=$(echo "$GUARDIAN_OUTPUT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('verdict', 'UNKNOWN'))" 2>/dev/null || echo "UNKNOWN")
          SUMMARY=$(echo "$GUARDIAN_OUTPUT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('summary', 'N/A'))" 2>/dev/null || echo "N/A")

          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-guardian-result
          path: /tmp/guardian-result.json

  # ---------------------------------------------------------------------------
  # Step 5: PR Comment Bot
  # ---------------------------------------------------------------------------
  pr-comment:
    name: Post results to PR
    runs-on: ubuntu-latest
    needs: [health-check, api-smoke, e2e, qa-guardian]
    if: always() && github.event.inputs.pr_number != ''
    permissions:
      pull-requests: write
    steps:
      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ github.event.inputs.pr_number }}');
            if (!prNumber) return;

            const healthStatus = '${{ needs.health-check.outputs.health_status }}';
            const deployHealth = '${{ needs.health-check.outputs.deploy_health }}';
            const smokeResult = '${{ needs.api-smoke.outputs.result }}';
            const smokePassed = '${{ needs.api-smoke.outputs.passed }}';
            const smokeTotal = '${{ needs.api-smoke.outputs.total }}';
            const e2eResult = '${{ needs.e2e.outputs.result }}';
            const e2ePassed = '${{ needs.e2e.outputs.passed }}';
            const e2eTotal = '${{ needs.e2e.outputs.total }}';
            const score = '${{ needs.qa-guardian.outputs.score }}' || '?';
            const verdict = '${{ needs.qa-guardian.outputs.verdict }}' || 'UNKNOWN';
            const summary = '${{ needs.qa-guardian.outputs.summary }}' || 'N/A';

            const icon = (v) => v === 'pass' ? ':white_check_mark:' : ':x:';
            const verdictIcon = verdict === 'SHIP' ? ':rocket:' : verdict === 'INVESTIGATE' ? ':mag:' : ':stop_sign:';

            const body = `## ${verdictIcon} Deploy Confidence: ${score}/100 — ${verdict}

            > ${summary}

            | Check | Result |
            |-------|--------|
            | Health check | ${icon(healthStatus)} ${healthStatus} |
            | Deploy health | ${deployHealth === 'HEALTHY' ? ':white_check_mark:' : ':warning:'} ${deployHealth} |
            | API smoke tests | ${icon(smokeResult)} ${smokePassed}/${smokeTotal} passed |
            | E2E tests | ${icon(e2eResult)} ${e2ePassed}/${e2eTotal} passed |

            [View workflow run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})

            ---
            _Generated by QA Guardian_`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body,
            });
