name: CI — Pre-merge checks

on:
  pull_request:
    branches: [staging, main]

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend: pytest + flake8
  # ---------------------------------------------------------------------------
  backend:
    name: Backend tests & lint
    runs-on: ubuntu-latest
    env:
      LOCAL_MODE: "true"
      DATABASE_URL: "sqlite+aiosqlite:///./test.db"
      REDIS_URL: "redis://localhost:6379"
      OPENAI_API_KEY: "sk-test-fake"
      ENCRYPTION_KEY: "test-encryption-key-32-bytes-ok!"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio aiosqlite flake8

      - name: Run linter
        run: flake8 src/ --max-line-length=120 --ignore=E501,W503

      - name: Run tests
        run: pytest -v tests/ --ignore=tests/e2e -x

  # ---------------------------------------------------------------------------
  # Frontend: vitest
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run
